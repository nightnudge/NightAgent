<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0A1F0F" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="NightNudge hilft dir, abends rechtzeitig das Handy wegzulegen – mit Erinnerungen, Streaks und wissenschaftlichen Fakten."
    />

    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NightNudge" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>NightNudge</title>
    <!-- build: 2026-07-03 -->
    <style>
      html,
      body {
        background: #0a1f0f;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #0a1f0f;
        transition: opacity 0.45s ease;
      }
      #splash img {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        box-shadow: 0 0 40px rgba(46, 125, 79, 0.35);
      }
      #splash span {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #e8f5e9;
        font-size: 17px;
        letter-spacing: 0.04em;
        opacity: 0.85;
      }
      #splash.splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true">
      <img src="/icons/icon-192.png" width="96" height="96" alt="" />
      <span>NightNudge</span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
